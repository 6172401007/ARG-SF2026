<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keamanan Laboratorium</title>
    <style>
        /* TEMA HACKER AWAL */
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #111; 
            color: #0f0; 
            text-align: center; 
            padding-top: 10vh; 
            transition: background-color 1.5s ease, color 1.5s ease; /* Transisi halus saat berubah warna */
        }
        .container {
            border: 2px solid #0f0;
            padding: 30px;
            display: inline-block;
            background: #000;
            box-shadow: 0 0 15px #0f0;
            transition: opacity 1s ease;
        }
        input { 
            padding: 10px; 
            font-size: 16px; 
            background: #222; 
            color: #0f0; 
            border: 1px solid #0f0; 
            outline: none;
            text-transform: uppercase;
        }
        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            background: #0f0; 
            color: #000; 
            cursor: pointer; 
            border: none; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        button:hover { background: #0c0; }
        #hasil { margin-top: 20px; font-size: 18px; font-weight: bold; }

        /* KELAS TAMBAHAN UNTUK MODE ROMANTIS */
        .romantic-mode {
            background-color: #ffe6e6 !important; /* Warna pink muda */
            color: #d60053 !important; /* Warna teks merah/pink tua */
            font-family: 'Arial', sans-serif !important;
        }
        .romantic-text {
            font-size: 50px;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(214, 0, 83, 0.5);
            animation: fadeInHeart 2s ease-in-out forwards;
            opacity: 0;
            margin-top: 15vh;
        }
        .romantic-subtext {
            font-size: 20px;
            margin-top: 10px;
            animation: fadeInHeart 3s ease-in-out forwards;
            opacity: 0;
        }

        /* Animasi Muncul Halus */
        @keyframes fadeInHeart {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <h2>[ TERMINAL PROTOKOL ANTIDOT ]</h2>
        <p>Masukkan kode penawar untuk menetralisir racun:</p>
        
        <input type="text" id="inputSandi" placeholder="Ketik kode di sini...">
        <button onclick="cekSandi()">Verifikasi</button>

        <p id="hasil"></p>
    </div>

    <script>
        // Kata sandi rahasia
        const KODE_RAHASIA = "I LOVE YOU RAISA";

        function cekSandi() {
            // Mengambil input dan mengubahnya menjadi huruf besar semua agar kebal typo huruf kapital
            const inputUser = document.getElementById('inputSandi').value.trim().toUpperCase();
            const pesanHasil = document.getElementById('hasil');
            const mainBox = document.getElementById('mainBox');
            
            if (inputUser === "") {
                pesanHasil.innerText = "Masukkan kode terlebih dahulu!";
                pesanHasil.style.color = "yellow";
                return;
            }

            pesanHasil.innerText = "Memverifikasi struktur molekul...";
            pesanHasil.style.color = "white";

            // Efek jeda loading palsu
            setTimeout(() => {
                if (inputUser === KODE_RAHASIA) {
                    
                    // JIKA BENAR: Hapus box hacker dan ubah tema
                    mainBox.style.opacity = "0"; // Memudarkan box hijau
                    
                    setTimeout(() => {
                        // Ubah tema ke Romantis
                        document.body.className = "romantic-mode";
                        
                        // Timpa seluruh isi body dengan pesan cinta
                        document.body.innerHTML = `
                            <div class="romantic-text">
                                I LOVE YOU TOO!! ❤️
                            </div>
                            <div class="romantic-subtext">
                                (Sistem Keamanan Berhasil Diretas oleh Cinta)
                            </div>
                        `;
                    }, 800); // Waktu tunggu box memudar sebelum ganti tema

                } else {
                    // JIKA SALAH
                    pesanHasil.innerText = "► AKSES DITOLAK: Kode salah. Kontaminasi berlanjut.";
                    pesanHasil.style.color = "red";
                }
            }, 1000); // Jeda 1 detik agar terasa seperti mesin sungguhan
        }
    </script>

</body>
</html>
